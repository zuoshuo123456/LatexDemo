  <style>
    * {

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.3);

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    
    #GameDiv {
      width: 100%;

      position: relative;
    }

      height: 100%;

<body>
  <!-- Loading 界面 -->
  <div id="loading-wrapper">

<!-- Polyfills bundle. -->

<!-- Import map -->
<script src="src/import-map.869a8.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    // 更新加载进度
    function updateProgress(text) {
        var progressEl = document.getElementById('loading-progress');
        if (progressEl) {
            progressEl.textContent = text;
        }
    }
    
    // 隐藏加载界面
    function hideLoading() {
        var loadingWrapper = document.getElementById('loading-wrapper');
        if (loadingWrapper) {
            updateProgress('加载完成!');
            setTimeout(function() {
                loadingWrapper.classList.add('hidden');
                // 完全移除元素以释放内存
                setTimeout(function() {
                    if (loadingWrapper.parentNode) {
                        loadingWrapper.parentNode.removeChild(loadingWrapper);
                    }
                }, 500);
            }, 500);
        }
    }
    
    // 显示错误信息
    function showError(message) {
        var loadingText = document.querySelector('.loading-text');
        var spinner = document.querySelector('.loading-spinner');
        var progress = document.getElementById('loading-progress');
        
        if (spinner) spinner.style.display = 'none';
        if (loadingText) {
            loadingText.textContent = '❌ 加载失败';
            loadingText.style.color = '#ff6b6b';
        }
        if (progress) {
            progress.textContent = message || '请刷新页面重试';
            progress.style.color = '#ff6b6b';
        }
    }
    
    // 加载游戏
    updateProgress('正在加载资源...');
    
    // 添加详细的错误日志
    window.addEventListener('error', function(e) {
        console.error('全局错误:', e.error || e.message);
        showError('资源加载错误: ' + (e.message || e.filename || '未知错误'));
    });
    
    // 检查 System 是否存在
    if (typeof System === 'undefined') {
        console.error('SystemJS 未加载');
        showError('SystemJS 未加载,请检查 system.bundle.js');
    } else {
        console.log('SystemJS 已加载,开始导入主文件...');
        updateProgress('SystemJS 已就绪,正在加载主文件...');
        
        System.import('./index.ab0bc.js')
            .then(function() {
                console.log('主文件加载成功');
                updateProgress('资源加载完成,正在初始化...');
                // 延迟隐藏加载界面,确保游戏完全启动
                setTimeout(hideLoading, 1500);
            })
            .catch(function(err) { 
                console.error('加载失败:', err);
                console.error('错误堆栈:', err.stack);
                showError('加载失败: ' + (err.message || err.toString() || '未知错误'));
            });
    }
</script>

</body>
