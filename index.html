<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <title>Markdown + LaTeX 混合渲染 Demo | Cocos Creator</title>
  <meta name="description" content="使用 Kiro AI Agent 解决 Markdown 加粗语法与 LaTeX 公式冲突问题的在线演示">
  <meta name="keywords" content="Markdown, LaTeX, Cocos Creator, AI Agent, 公式渲染">
  <meta name="author" content="Elephant AI Team">

  <!--http://www.html5rocks.com/en/mobile/mobifying/-->
  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>

  <!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <!-- force webkit on 360 -->
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <!-- force edge on IE -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">

  <!-- force full screen on some browser -->
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>

  <!--fix fireball/issues/3568 -->
  <!--<meta name="browsermode" content="application">-->
  <meta name="x5-page-mode" content="app">

  <!--<link rel="apple-touch-icon" href=".png" />-->
  <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

  <link rel="stylesheet" type="text/css" href="style.f76d1.css"/>
  
  <!-- 添加 Loading 样式 -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    #loading-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    #loading-wrapper.hidden {
      display: none;
    }
    
    .loading-title {
      color: white;
      font-size: 2em;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .loading-text {
      color: white;
      margin-top: 20px;
      font-size: 1.1em;
      opacity: 0.9;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #GameDiv {
      width: 100%;
      height: 100vh;
    }
  </style>

</head>
<body>
  <!-- Loading 界面 -->
  <div id="loading-wrapper">
    <h1 class="loading-title">🔬 Markdown + LaTeX Demo</h1>
    <div class="loading-spinner"></div>
    <p class="loading-text">正在加载演示项目...</p>
  </div>
  
  <div id="GameDiv" cc_exact_fit_screen="true">
      <div id="Cocos3dGameContainer">
        <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
      </div>
    </div>
  

<!-- Polyfills bundle. -->

<script src="src/polyfills.bundle.5adbf.js" charset="utf-8"> </script>


<!-- SystemJS support. -->
<script src="src/system.bundle.543e6.js" charset="utf-8"> </script>

<!-- Import map -->
<script src="src/import-map.869a8.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    System.import('./index.ab0bc.js').then(function() {
        // 游戏加载完成，隐藏 Loading
        setTimeout(function() {
            var loadingWrapper = document.getElementById('loading-wrapper');
            if (loadingWrapper) {
                loadingWrapper.classList.add('hidden');
            }
        }, 1000);
    }).catch(function(err) { 
        console.error('加载失败:', err);
        var loadingText = document.querySelector('.loading-text');
        if (loadingText) {
            loadingText.textContent = '加载失败，请刷新页面重试';
            loadingText.style.color = '#ff6b6b';
        }
    });
</script>

</body>
</html>
